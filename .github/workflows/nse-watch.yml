name: NSE Announcements Watcher

on:
  repository_dispatch:
    types: [cron-trigger]
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1 # ફાસ્ટ રન અને મર્જ હિસ્ટ્રી કન્ફ્લિક્ટ અટકાવવા માટે

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests openpyxl

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python fetch_and_notify.py

      - name: Persist seen-items state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add seen.json
          git add log.json || true
          git add announcements.xlsx || true
          
          # જો ફેરફાર હોય તો જ કમિટ કરો
          if ! git diff --staged --quiet; then
            git commit -m "update seen state and logs [skip ci]"
            
            # 🚀 મોટો ફેરફાર: કન્ફ્લિક્ટ અટકાવવા માટે સીધું જ ફોર્સ પુશ
            git push origin main --force
          else
            echo "No changes to commit."
          fi
