name: NSE Announcements Watcher

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay slightly during peak load)
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write            # needed so the workflow can commit the updated seen.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests openpyxl

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_and_notify.py

      - name: Persist seen-items state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json log.json announcements.xlsx
          git diff --staged --quiet || git commit -m "update seen state and logs [skip ci]"
          git push
