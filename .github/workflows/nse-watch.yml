# .github/workflows/nse-bot.yml
name: NSE Announcement Bot

permissions:
  contents: write
  actions: read

on:
  # ONLY trigger from cronjobs.org
  repository_dispatch:
    types: [cron-trigger]
  
  # Manual trigger for testing (optional)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    
    # Prevent multiple concurrent runs
    concurrency:
      group: nse-bot
      cancel-in-progress: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests openpyxl
    
    - name: Run NSE Bot
      id: bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        RUN_SOURCE: "cronjobs.org"
      run: |
        python fetch_and_notify.py
    
    - name: Upload Excel file as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: announcements-${{ github.run_id }}
        path: |
          announcements.xlsx
          run_log.txt
        retention-days: 7
    
    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # Add database, excel and log files
        git add announcements.db announcements.xlsx run_log.txt || true
        
        # Commit if there are changes
        if ! git diff --staged --quiet; then
          git commit -m "🔄 Auto-update: NSE announcements [skip ci]"
          git push
        else
          echo "✅ No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    
    - name: Send failure notification
      if: failure()
      run: |
        curl -X POST -H "Content-Type: application/json" \
          -d '{"text":"❌ NSE Bot failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"