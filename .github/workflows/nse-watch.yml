name: NSE Watch - Daily Announcements

permissions:
  contents: write

on:
  repository_dispatch:
    types: [cron-trigger]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: nse-watch
      cancel-in-progress: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install feedparser requests openpyxl python-dateutil

    - name: Run NSE Watch Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEETS_WEB_APP_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}
      run: |
        python fetch_and_notify.py

    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add announcements.db announcements.xlsx run_log.txt || true
        if ! git diff --staged --quiet; then
          git commit -m "🔄 Auto-update: NSE announcements [skip ci]"
          git push
        fi