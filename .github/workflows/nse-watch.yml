name: NSE Announcements Watcher

on:
  repository_dispatch:
    types: [cron-trigger]
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # કેશિંગ ઓપ્શન હટાવી દીધો છે જેથી requirements.txt ની ભૂલ ન આવે

      - name: Install dependencies
        run: |
          pip install feedparser requests openpyxl

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python fetch_and_notify.py

      - name: Persist seen-items state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add seen.json
          git add log.json || true
          git add announcements.xlsx || true
          
          git diff --staged --quiet || git commit -m "update seen state and logs [skip ci]"
          
          git pull --rebase origin main
          git push
