name: NSE Announcements Watcher

on:
  repository_dispatch:
    types: [cron-trigger]
  workflow_dispatch:

concurrency:
  group: nse-watcher
  cancel-in-progress: false   # queue overlapping runs instead of racing them (prevents duplicate Telegram messages)

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # fail fast rather than let a hung run block the next trigger for a long time
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nse-watcher-${{ hashFiles('.github/workflows/nse-watcher.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-nse-watcher-

      - name: Install dependencies
        run: |
          pip install feedparser requests openpyxl

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python fetch_and_notify.py

      - name: Persist seen-items state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add seen.json
          git add log.json || true
          git add announcements.xlsx || true

          if ! git diff --staged --quiet; then
            git commit -m "update seen state and logs [skip ci]"

            # Retry with rebase instead of force-push, so we never silently
            # discard another run's state if pushes ever land close together.
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying..."
              sleep 3
            done
          else
            echo "No changes to commit."
          fi