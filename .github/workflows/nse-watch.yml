name: NSE Announcements Watcher

concurrency:
  group: nse-watcher
  cancel-in-progress: false

on:
  workflow_dispatch: {}       # triggered externally by cron-job.org every 5 min

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests openpyxl

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_and_notify.py

      - name: Persist seen-items state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json log.json announcements.xlsx
          git diff --staged --quiet || git commit -m "update seen state and logs [skip ci]"
          git pull --rebase origin main
          git push